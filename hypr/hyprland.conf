# hyprland.conf — managed by archinstall
# The $bar variable and exec-once line are patched automatically during installation.

################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@60, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal    = ghostty
$fileManager = yazi
$menu        = wofi --show drun
$browser     = zen-browser
$bar         = waybar          # replaced by installer

#################
### AUTOSTART  ###
#################

exec-once = $bar
exec-once = hyprpaper
exec-once = hypridle
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEO_DRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 3
    gaps_out = 5

    border_size = 1

    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled   = true
        size      = 3
        passes    = 1
        vibrancy  = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,    0.23, 1,    0.32, 1
    bezier = easeInOutCubic,  0.65, 0.05, 0.36, 1
    bezier = linear,          0,    0,    1,    1
    bezier = almostLinear,    0.5,  0.5,  0.75, 1.0
    bezier = quick,           0.15, 0,    0.1,  1

    animation = global,         1, 10,  default
    animation = border,         1, 5,   easeOutQuint
    animation = windows,        1, 4,   easeOutQuint
    animation = windowsIn,      1, 4,   easeOutQuint,   popin 87%
    animation = windowsOut,     1, 1.5, linear,         popin 87%
    animation = fadeIn,         1, 1.7, almostLinear
    animation = fadeOut,        1, 1.5, almostLinear
    animation = fade,           1, 3,   quick
    animation = layers,         1, 3.8, easeOutQuint
    animation = layersIn,       1, 4,   easeOutQuint,   fade
    animation = layersOut,      1, 1.5, linear,         fade
    animation = fadeLayersIn,   1, 1.8, almostLinear
    animation = fadeLayersOut,  1, 1.4, almostLinear
    animation = workspaces,     1, 2,   almostLinear,   fade
    animation = workspacesIn,   1, 1.2, almostLinear,   fade
    animation = workspacesOut,  1, 2,   almostLinear,   fade
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = false
}

#############
### INPUT ###
#############

input {
    kb_layout  = br
    kb_variant = abnt2
    kb_model   = abnt2
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = -0.2
    numlock_by_default = true

    accel_profile = flat

    touchpad {
        natural_scroll = true
    }
}

gestures {
    workspace_swipe = true
}

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Applications
bind = $mainMod,       Q, exec, $terminal
bind = $mainMod,       E, exec, $fileManager
bind = $mainMod,       R, exec, $menu
bind = $mainMod,       B, exec, $browser

# Window management
bind = $mainMod,       C, killactive,
bind = $mainMod,       V, togglefloating,
bind = $mainMod,       P, pseudo,          # dwindle pseudotile
bind = $mainMod,       J, togglesplit,     # dwindle
bind = $mainMod,       M, exit,
bind = $mainMod,       L, exec, hyprlock

# Bar toggle (patched to match chosen bar)
bind = $mainMod, Escape, exec, killall waybar || waybar

# Screenshot
bind =          , PRINT,       exec, hyprshot -m window
bind = SHIFT,   , PRINT,       exec, hyprshot -m region

# Clipboard history (cliphist)
bind = $mainMod, semicolon, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move / resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio (pipewire / wireplumber)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume    @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute      @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute      @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Media (playerctl)
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Suppress maximize requests from apps
windowrule = suppressevent maximize, class:.*

# Float pavucontrol
windowrule = float, class:^(org.pulseaudio.pavucontrol)$

# Float nm-applet connection editor
windowrule = float, class:^(nm-connection-editor)$

# Fix XWayland drag issues
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
